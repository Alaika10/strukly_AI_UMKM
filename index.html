<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OCR Scanner</title>
</head>
<body>

    <div class="card">
        <h2>OCR Scanner</h2>
        <p>Pilih foto struk belanja untuk diproses.</p>
        
        <input type="file" id="inputGambar" accept="image/png, image/jpeg">
        
        <div class="preview-container">
            <span id="placeholderTeks">Preview gambar akan muncul di sini</span>
            <img id="previewGambar" src="" alt="Preview Struk">
        </div>

        <button id="btnUpload" disabled>Mulai Pemindaian OCR</button>
    </div>

    <div class="card">
        <div class="timer" id="timerDisplay">Waktu Eksekusi: 0.00s</div>
        
        <h3>Output OCR Mentah:</h3>
        <div class="result-box" id="teksOcr">Menunggu input...</div>
    </div>

    <script>
        const FASTAPI = "https://sicheater99-ocr.hf.space/scan-ocr/"; 

        const inputGambar = document.getElementById('inputGambar');
        const previewGambar = document.getElementById('previewGambar');
        const placeholderTeks = document.getElementById('placeholderTeks');
        const btnUpload = document.getElementById('btnUpload');
        const timerDisplay = document.getElementById('timerDisplay');
        const teksOcr = document.getElementById('teksOcr');

        let intervalTimer;
        let waktuMulai;

        inputGambar.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    previewGambar.src = e.target.result;
                    previewGambar.style.display = 'block';
                    placeholderTeks.style.display = 'none';
                    btnUpload.disabled = false;
                }
                reader.readAsDataURL(file);
            }
        });

        btnUpload.addEventListener('click', async function() {
            const file = inputGambar.files[0];
            if (!file) return;

            const formData = new FormData();
            formData.append("file", file);

            btnUpload.disabled = true;
            btnUpload.innerText = "Sedang Memproses...";
            teksOcr.innerText = "Mesin OCR sedang membaca...";
            
            waktuMulai = Date.now();
            intervalTimer = setInterval(() => {
                const waktuBerjalan = ((Date.now() - waktuMulai) / 1000).toFixed(2);
                timerDisplay.innerText = `Waktu Eksekusi: ${waktuBerjalan}s`;
            }, 50);

            try {
                // Eksekusi pemanggilan API
                const response = await fetch(FASTAPI, {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();
                
                clearInterval(intervalTimer);
                
                if (data.sukses) {
                    teksOcr.innerText = data.ocr_mentah;
                } else {
                    teksOcr.innerText = "Terjadi Kesalahan di Backend: \n" + data.pesan;
                }
            } catch (error) {
                clearInterval(intervalTimer);
                teksOcr.innerText = "Gagal terhubung ke API.\nError: " + error.message;
            } finally {
                btnUpload.disabled = false;
                btnUpload.innerText = "Mulai Pemindaian OCR";
            }
        });
    </script>
        <style>
        body { background-color: #f4f7f6; padding: 20px; max-width: 800px; margin: auto; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .preview-container { text-align: center; margin: 15px 0; border: 2px dashed #ccc; padding: 10px; border-radius: 8px; min-height: 200px; display: flex; align-items: center; justify-content: center;}
        img { max-width: 100%; max-height: 400px; border-radius: 5px; display: none; }
        button { background-color: blue; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-size: 16px; width: 100%;}
        .timer { font-size: 24px; font-weight: bold; color: red; text-align: center; margin: 15px 0; }
        .result-box { background: #222; color: #abb2bf; padding: 15px; border-radius: 5px; min-height: 100px; white-space: pre-wrap; word-wrap: break-word; font-family: monospace;}
    </style>
</body>

</html>
