<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OCR Scanner</title>
</head>
<body>

    <div class="card">
        <h2>OCR Scanner</h2>
        <p>Pilih foto struk belanja untuk diproses.</p>
        
        <input type="file" id="inputGambar" accept="image/*" capture="environment">
        
        <div class="preview-container">
            <span id="placeholderTeks">Preview gambar akan muncul di sini</span>
            <img id="previewGambar" src="" alt="Preview Struk">
        </div>

        <button id="btnUpload" disabled>Mulai Pemindaian OCR</button>
    </div>

    <div class="card">
        <div class="timer" id="timerDisplay">Waktu Eksekusi: 0.00s</div>
        
        <div class="result-container">
            <div class="kolom-kiri">
                <h3>Output OCR Mentah:</h3>
                <div class="result-box" id="teksOcr">Menunggu input...</div>
            </div>
            
            <div class="kolom-kanan">
                <h3>Data Terstruktur:</h3>
                <div class="result-box" style="white-space: normal; line-height: 1.2;">
                    
                    <div style="color: white; font-weight: bold;">Merchant:</div>
                    <div id="merchantValue" style="color: white; font-size: 1.1em; margin-bottom: 12px; margin-top: 2px;">-</div>

                    <div style="color: white; font-weight: bold;">Tanggal Transaksi:</div>
                    <div id="tanggalValue" style="color: white; font-size: 1.1em; margin-bottom: 12px; margin-top: 2px;">-</div>

                    <div style="color: white; font-weight: bold;">Total Belanja:</div>
                    <div id="totalValue" style="color: white; font-size: 1.1em; margin-bottom: 12px; margin-top: 2px;">-</div>

                    <div style="color: white; font-weight: bold;">Daftar Item:</div>
                    <pre id="itemsValue" style="color: white; font-size: 1em; margin-top: 2px; font-family: monospace;">-</pre>

                    <div style="color: white; font-weight: bold;">Kategori (Classes):</div>
                    <div id="classesValue" style="color: white; font-size: 1.1em; margin-bottom: 12px; margin-top: 2px;">-</div>

                    <div style="color: white; font-weight: bold;">Kategori:</div>
                    <div id="classNameValue" style="color: white; font-size: 1.1em; margin-bottom: 12px; margin-top: 2px;">-</div>

                    <div style="color: white; font-weight: bold;">Confidence:</div>
                    <div id="confidence" style="color: white; font-size: 1.1em; margin-bottom: 12px; margin-top: 2px;">-</div>

                </div>
            </div>
            </div>
        </div>
    </div>

    <script>
        const FASTAPI = "https://sicheater99-ocr-trial.hf.space/scan-ocr/"; 

    const inputGambar = document.getElementById('inputGambar');
        const previewGambar = document.getElementById('previewGambar');
        const placeholderTeks = document.getElementById('placeholderTeks');
        const btnUpload = document.getElementById('btnUpload');
        const timerDisplay = document.getElementById('timerDisplay');
        const teksOcr = document.getElementById('teksOcr');
        
        const merchantValue = document.getElementById('merchantValue');
        const tanggalValue = document.getElementById('tanggalValue');
        const totalValue = document.getElementById('totalValue');
        const classesValue = document.getElementById('classesValue');
        const itemsValue = document.getElementById('itemsValue');
        const classNameValue = document.getElementById('classNameValue');
        const confidence = document.getElementById('confidence');

        let intervalTimer;
        let waktuMulai;
        let compressedFile = null;

        async function compressImage(file, maxWidth = 960, quality = 0.75) {
            return new Promise((resolve) => {
                const img = new Image();
                const reader = new FileReader();

                reader.onload = function (e) {
                    img.src = e.target.result;
                };

                img.onload = function () {
                    const canvas = document.createElement("canvas");
                    const ctx = canvas.getContext("2d");

                    let width = img.width;
                    let height = img.height;

                    if (width > maxWidth) {
                        height = Math.round((height * maxWidth) / width);
                        width = maxWidth;
                    }

                    canvas.width = width;
                    canvas.height = height;

                    ctx.drawImage(img, 0, 0, width, height);

                    canvas.toBlob(
                        (blob) => {
                            resolve(new File([blob], "compressed.jpg", {
                                type: "image/jpeg"
                            }));
                        },
                        "image/jpeg",
                        quality
                    );
                };

                reader.readAsDataURL(file);
            });
        }

        inputGambar.addEventListener('change', async function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();

            reader.onload = function(e) {
                previewGambar.src = e.target.result;
                previewGambar.style.display = 'block';
                placeholderTeks.style.display = 'none';
            };

            reader.readAsDataURL(file);

            btnUpload.disabled = true;
            btnUpload.innerText = "Mengompres Gambar...";

            compressedFile = await compressImage(file, 1080, 0.75);

            btnUpload.disabled = false;
            btnUpload.innerText = "Mulai Pemindaian OCR";
        });

        btnUpload.addEventListener('click', async function() {
            if (!compressedFile) return;

            const formData = new FormData();
            formData.append("file", compressedFile);

            btnUpload.disabled = true;
            btnUpload.innerText = "Sedang Memproses...";
            teksOcr.innerText = "Mesin OCR sedang membaca...";
            
            merchantValue.innerText = "-";
            tanggalValue.innerText = "-";
            totalValue.innerText = "-";
            classesValue.innerText = "-";
            itemsValue.innerText = "-";
            classNameValue.innerText = "-";
            confidence,innerText = "-"


            waktuMulai = Date.now();
            intervalTimer = setInterval(() => {
                const waktuBerjalan = ((Date.now() - waktuMulai) / 1000).toFixed(2);
                timerDisplay.innerText = `Waktu Eksekusi: ${waktuBerjalan}s`;
            }, 50);

            try {
                const response = await fetch(FASTAPI, {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                clearInterval(intervalTimer);

                if (data.sukses) {
                    teksOcr.innerText = data.ocr_mentah;
                    
                    // 1. Merchant
                    if (data.merchant) {
                        merchantValue.innerText = data.merchant;
                    } else {
                        merchantValue.innerText = "Tidak ditemukan";
                    }

                    // 2. Tanggal
                    if (data.date) {
                        tanggalValue.innerText = data.date;
                    } else {
                        tanggalValue.innerText = "Tidak ditemukan";
                    }

                    // 3. Total
                    if (data.total) {
                        totalValue.innerText = data.total;
                    } else {
                        totalValue.innerText = "Tidak ditemukan";
                    }

                    // 4. Classes (Kategori)
                    if (data.classes) {
                        classesValue.innerText = data.classes;
                    } else {
                        classesValue.innerText = "Tidak ditemukan";
                    }

                    // 5. Items
                    if (data.items) {
                        if (typeof data.items === 'object') {
                            itemsValue.innerText = JSON.stringify(data.items, null, 2);
                        } else {
                            itemsValue.innerText = data.items;
                        }
                    } else {
                        itemsValue.innerText = "Tidak ditemukan";
                    }

                    // 6. Kategori
                    if (data.category_name) {
                        classNameValue.innerText = data.category_name;
                    } else {
                        classNameValue.innerText = "Kategori Tidak ditemukan";
                    }

                    // 7. Confidence
                    if (data.confidence) {
                        confidence.innerText = data.confidence;
                    } else {
                        confidence.innerText = "Confidence Tidak ditemukan";
                    }


                } else {
                    teksOcr.innerText = "Terjadi Kesalahan di Backend:\n" + data.pesan;
                    merchantValue.innerText = "Error";
                    tanggalValue.innerText = "Error";
                    totalValue.innerText = "Error";
                    classesValue.innerText = "Error";
                    itemsValue.innerText = "Error";
                }   
            } catch (error) {
                clearInterval(intervalTimer);
                teksOcr.innerText = "Gagal terhubung ke API.\nError: " + error.message;
                merchantValue.innerText = "Gagal";
                tanggalValue.innerText = "Gagal";
                totalValue.innerText = "Gagal";
                classesValue.innerText = "Gagal";
                itemsValue.innerText = "Gagal";
            } finally {
                btnUpload.disabled = false;
                btnUpload.innerText = "Mulai Pemindaian OCR";
            }
        });

    </script>

    <style>
        body { background-color: #ddd; padding: 20px; max-width: 800px; margin: auto; font-family: Arial, sans-serif;}
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .preview-container { text-align: center; margin: 15px 0; border: 2px dashed #ccc; padding: 10px; border-radius: 8px; min-height: 200px; display: flex; align-items: center; justify-content: center;}
        img { max-width: 100%; max-height: 400px; border-radius: 5px; display: none; }
        button { background-color: blue; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-size: 16px; width: 100%;}
        .timer { font-size: 24px; font-weight: bold; color: red; text-align: center; margin: 15px 0; }
        .result-container { display: flex; gap: 20px; flex-wrap: wrap; }
        .kolom-kiri, .kolom-kanan { flex: 1; min-width: 300px; }
        .result-box { background: #222; color: #abb2bf; padding: 15px; border-radius: 5px; min-height: 100px; white-space: pre-wrap; word-wrap: break-word; font-family: monospace;}
    </style>
</body>

</html>
